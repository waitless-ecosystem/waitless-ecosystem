<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner - QR Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- QR Code Scanning Library -->
    <!--<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script> -->

    <script type="module">
    import QrScanner from "https://unpkg.com/qr-scanner@1.4.2/qr-scanner.min.js";
    window.QrScanner = QrScanner;
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div id="app-page" class="app-container glass-effect">
        <header class="app-header">
            <div class="header-top">
                <h1>QR Connect</h1>
                <button id="logout-btn" class="logout-btn">Logout</button>
            </div>
            <p>Scan QR Codes</p>
        </header>

        <div class="tab-content active" id="scan-tab">
            <div id="reader-container" class="qr-box scan-box">
                <!--<div id="reader"></div>-->
                <video id="reader" playsinline></video>
            </div>
            <div class="result-group">
    <p>Scanned Result:</p>
    <div id="scan-result" class="scan-result-box">No result yet</div>
    <div class="button-group">
        <button id="copy-btn" class="action-btn hidden">Copy to Clipboard</button>
        <button id="resume-btn" class="action-btn hidden">Scan Again</button>
    </div>
        </div>
    </div>
    <script src="../../js/config/firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
