<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KIOSK Terminal Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .kiosk-login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 500px;
      padding: 40px;
    }

    .kiosk-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .kiosk-header h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
    }

    .kiosk-header p {
      color: #666;
      font-size: 14px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .view {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .view.hidden {
      display: none;
    }

    .step-indicator {
      text-align: center;
      margin-bottom: 20px;
      font-size: 12px;
      color: #999;
    }

    .step-indicator .step {
      display: inline-block;
      width: 30px;
      height: 30px;
      line-height: 30px;
      border-radius: 50%;
      background: #e0e0e0;
      color: #666;
      margin: 0 5px;
      font-weight: 600;
    }

    .step-indicator .step.active {
      background: #667eea;
      color: white;
    }

    .step-indicator .step.completed {
      background: #4caf50;
      color: white;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }

    .form-group input,
    .form-group select {
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    .pin-input {
      font-size: 24px;
      letter-spacing: 8px;
      text-align: center;
      font-weight: bold;
    }

    .pin-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 20px 0;
    }

    .pin-button {
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      border: 2px solid #e0e0e0;
      background: #f5f5f5;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      touch-action: manipulation;
    }

    .pin-button:hover {
      background: #efefef;
      border-color: #667eea;
    }

    .pin-button:active {
      transform: scale(0.95);
      background: #ddd;
    }

    .pin-button.delete {
      grid-column: span 2;
      background: #ffebee;
      border-color: #ff5252;
      color: #c62828;
    }

    .pin-button.delete:hover {
      background: #ffcdd2;
    }

    .pin-button.submit {
      grid-column: span 1;
      background: #4caf50;
      border-color: #4caf50;
      color: white;
      font-weight: bold;
    }

    .pin-button.submit:hover {
      background: #45a049;
    }

    .login-button {
      padding: 14px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    .login-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    .login-button:active {
      transform: translateY(0);
    }

    .login-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      padding: 12px 15px;
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
      margin-bottom: 15px;
      min-height: 20px;
    }

    .message.error {
      background: #ffebee;
      color: #c62828;
      border: 1px solid #ef5350;
    }

    .message.success {
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #66bb6a;
    }

    .message.info {
      background: #e3f2fd;
      color: #1565c0;
      border: 1px solid #42a5f5;
    }

    .loading {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: currentColor;
      animation: blink 1.4s infinite;
      margin-left: 4px;
    }

    @keyframes blink {
      0%, 20%, 50%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
      60% { opacity: 0.5; }
    }

    .device-info {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e0e0e0;
      font-size: 12px;
      color: #999;
    }

    /* Responsive adjustments */
    @media (max-width: 600px) {
      .kiosk-login-container {
        padding: 30px 20px;
      }

      .kiosk-header h1 {
        font-size: 24px;
      }

      .pin-button {
        padding: 20px;
        font-size: 24px;
      }
    }

    .hidden {
      display: none !important;
    }

    .loading-spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="kiosk-login-container">
    <div class="kiosk-header">
      <h1>Welcome to KIOSK</h1>
      <p>Customer Service Terminal</p>
    </div>

    <div id="message" class="message"></div>

    <!-- Step Indicator -->
    <div class="step-indicator">
      <span class="step active" id="step1">1</span>
      <span class="step" id="step2">2</span>
      <span class="step" id="step3">3</span>
    </div>

    <!-- Step 1: User Authentication View -->
    <div id="user-auth-view" class="view">
      <h3 style="text-align: center; margin-bottom: 20px; color: #333;">Step 1: Account Login</h3>
      <form id="user-auth-form" class="login-form">
        <div class="form-group">
          <label for="user-email">Email Address:</label>
          <input type="email" id="user-email" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label for="user-password">Password:</label>
          <input type="password" id="user-password" placeholder="Enter password" required />
        </div>
        <button type="submit" class="login-button">Login</button>
      </form>
    </div>

    <!-- Step 2: KIOSK Selection View -->
    <div id="kiosk-select-view" class="view hidden">
      <h3 style="text-align: center; margin-bottom: 20px; color: #333;">Step 2: Select Device</h3>
      <form id="kiosk-select-form" class="login-form">
        <div class="form-group">
          <label for="kiosk-select">Select KIOSK Terminal:</label>
          <select id="kiosk-select" required>
            <option value="">-- Choose a KIOSK --</option>
          </select>
        </div>
        <button type="submit" class="login-button">Continue</button>
        <button type="button" class="login-button" id="back-from-kiosk-btn" style="background: linear-gradient(135deg, #999 0%, #666 100%); margin-top: 10px;">Back</button>
      </form>
    </div>

    <!-- Step 3: PIN Entry View -->
    <div id="pin-entry-view" class="view hidden">
      <h3 style="text-align: center; margin-bottom: 20px; color: #333;">Step 3: Enter PIN</h3>
      <form id="pin-login-form" class="login-form">
        <div class="form-group">
          <label for="pin-input">Device PIN:</label>
          <input
            type="password"
            id="pin-input"
            class="pin-input"
            placeholder="•••• ••••"
            readonly
            maxlength="6"
          />
        </div>

        <div class="pin-pad">
          <button type="button" class="pin-button" data-pin="1">1</button>
          <button type="button" class="pin-button" data-pin="2">2</button>
          <button type="button" class="pin-button" data-pin="3">3</button>
          <button type="button" class="pin-button" data-pin="4">4</button>
          <button type="button" class="pin-button" data-pin="5">5</button>
          <button type="button" class="pin-button" data-pin="6">6</button>
          <button type="button" class="pin-button" data-pin="7">7</button>
          <button type="button" class="pin-button" data-pin="8">8</button>
          <button type="button" class="pin-button" data-pin="9">9</button>
          <button type="button" class="pin-button delete" data-action="delete">Delete</button>
          <button type="button" class="pin-button" data-pin="0">0</button>
          <button type="button" class="pin-button submit" data-action="submit">→</button>
        </div>

        <button type="button" class="login-button" id="clear-btn">Clear</button>
        <button type="button" class="login-button" id="back-btn" style="background: linear-gradient(135deg, #999 0%, #666 100%);">Back</button>
      </form>
    </div>

    <div class="device-info">
      <p id="device-info">Device: <span id="device-name">Loading...</span></p>
    </div>
  </div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script src="firebase-config.js"></script>
  <script>
    // Initialize Firebase
    if(!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
  </script>
  <script src="kiosk-db.js"></script>
  <script src="kiosk-login.js"></script>
</body>
</html>
