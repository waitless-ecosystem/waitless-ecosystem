<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Counter Live — EcoSystem</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#f6f8fb;padding:18px}
    .panel{max-width:1100px;margin:0 auto;background:#fff;padding:18px;border-radius:8px;box-shadow:0 6px 22px rgba(10,20,40,0.06)}
    .row{display:flex;gap:12px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
    select,input{padding:10px;border:1px solid #dbe6ef;border-radius:6px}
    .tokens{display:grid;gap:10px;margin-top:12px}
    .token{display:grid;grid-template-columns:1fr 240px;gap:18px;align-items:stretch;padding:18px;border-radius:12px;border:1px solid #eef6ff;background:#fbfdff}
    .token .actions{display:flex;flex-direction:column;gap:12px;justify-content:center}
    .token .actions button{width:100%;min-height:76px;font-size:1.2rem;font-weight:700;border-radius:14px;border:0;cursor:pointer}
    .btn-serve{background:#0a8f47;color:#fff}
    .btn-noshow{background:#ff5252;color:#fff}
    .muted{color:#6b7785;font-size:13px}
    .token-number{display:flex;align-items:center;justify-content:center;min-height:240px;font-size:8rem;font-weight:900;line-height:1;color:#0b1220;text-align:center}
    .token-empty{padding:32px;text-align:center;font-size:1.1rem}
    .token-stage{display:flex;flex-direction:column;justify-content:center;gap:8px}
    .token-meta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;color:#6b7785}
    @media (max-width:700px){
      .token{grid-template-columns:1fr}
      .token-number{min-height:160px;font-size:5rem}
    }
  </style>
</head>
<body>
  <div class="panel active">
    <h2>Counter Live Display</h2>
    <p class="muted">Sign in on the main organization login, then select a counter here.</p>

    <div class="row">
      <div>
        <div class="muted small">Signed in as</div>
        <div id="auth-user" class="small">Not signed in</div>
      </div>
      <button id="org-logout" class="ghost" style="display:none">Sign Out</button>
    </div>

    <div id="selection-row" class="row">
      <label for="org-select">Organization</label>
      <select id="org-select" disabled><option value="">-- Sign in first --</option></select>

      <label for="counter-select">Counter</label>
      <select id="counter-select" disabled><option value="">-- Select counter --</option></select>

      <button id="refresh-orgs" class="primary ghost" disabled>Refresh Orgs</button>
    </div>

    <div id="status" class="muted">Not connected</div>

    <div id="tokens" class="tokens"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="counter-display.js"></script>
</body>
</html>
