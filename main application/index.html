<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- QR Code scanning -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.4/html5-qrcode.min.js"></script>
    <!-- Google Sign-In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- JWT Decode -->
    <script src="https://cdn.jsdelivr.net/npm/jwt-decode@4.0.0/build/jwt-decode.js"></script>
    <!-- Firebase Compat (works with script tags) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
    <!-- Login Page -->
    <div id="login-page" class="login-container glass-effect">
        <div class="login-content">
            <header class="login-header">
                <h1>QR Connect</h1>
                <p>Sign in to continue</p>
            </header>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <div id="google-signin-container" class="google-signin-btn"></div>

            <p class="signup-text">Don't have an account? <a href="signup.html" id="signup-link">Sign up here</a></p>
        </div>
    </div>

    <!-- App Container (Hidden until login) -->
    <div id="app-page" class="app-container glass-effect" style="display: none;">
        <header class="app-header">
            <div class="header-top">
                <h1>QR Connect</h1>
                <button id="logout-btn" class="logout-btn">Logout</button>
            </div>
            <p>Scan QR Codes</p>
        </header>

        <div class="tab-content active" id="scan-tab">
            <div id="reader-container" class="qr-box scan-box">
                <div id="reader"></div>
            </div>
            <div class="result-group">
                <p>Scanned Result:</p>
                <div id="scan-result" class="scan-result-box">No result yet</div>
                <button id="copy-btn" class="hidden">Copy to Clipboard</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
